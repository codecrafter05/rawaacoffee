<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rawaa Speciality Coffee — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #F0E4CB;
      color: #4A2E15;
      font-family: "Hanken Grotesk", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: #4A2E15; text-decoration: none; }
    ::selection { background: #4A2E15; color: #F0E4CB; }
    img { display: block; max-width: 100%; }

    @keyframes rw-fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes rw-fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes rw-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rw-line-grow { from { width: 0; } to { width: 90px; } }

    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(40px, 7vh, 80px) 24px 60px;
      box-sizing: border-box;
    }

    .watermark {
      position: fixed;
      right: -18vw;
      bottom: -12vh;
      width: 90vw;
      max-width: 900px;
      opacity: .05;
      pointer-events: none;
      user-select: none;
    }

    .logo-ring {
      position: relative;
      width: 190px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: rw-fade-in 1.2s both;
    }
    .logo-ring svg {
      position: absolute;
      inset: 0;
      animation: rw-spin 22s linear infinite;
      color: #4A2E15;
    }
    .logo-ring text {
      font-family: "Hanken Grotesk", sans-serif;
      font-size: 7.2px;
      font-weight: 600;
      letter-spacing: .38em;
      fill: currentColor;
    }
    .logo-core {
      width: 122px;
      height: 122px;
      border: 1.5px dotted rgba(74, 46, 21, .5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(240, 228, 203, .6);
    }
    .logo-core img { width: 72px; }

    .brand-block {
      margin-top: 30px;
      text-align: center;
      animation: rw-fade-up 1s .2s both;
    }
    .brand-name {
      font-family: "Abhaya Libre", serif;
      font-weight: 700;
      font-size: clamp(40px, 9vw, 54px);
      line-height: 1;
    }
    .brand-ar {
      margin-top: 10px;
      font-size: 17px;
      color: #A8842B;
    }
    .brand-sub {
      margin-top: 12px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .4em;
      text-indent: .4em;
      text-transform: uppercase;
      opacity: .65;
    }
    .brand-line {
      margin: 22px auto 0;
      border-top: 2px dotted rgba(74, 46, 21, .5);
      width: 90px;
      animation: rw-line-grow 1s .6s both;
    }

    .links {
      width: min(480px, 100%);
      margin-top: 44px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1.5px solid #4A2E15;
      border-radius: 999px;
      padding: 8px 10px 8px 26px;
      background: transparent;
      transition: background .35s, transform .35s cubic-bezier(.22, 1, .36, 1), color .35s;
    }
    .link:hover {
      background: #4A2E15;
      color: #F0E4CB;
      transform: translateY(-3px);
    }
    .link.branch {
      border-radius: 28px;
      padding: 16px 10px 16px 26px;
    }
    .link-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .18em;
      color: #A8842B;
    }
    .link-body { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .link-title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .link-title {
      font-family: "Abhaya Libre", serif;
      font-size: 24px;
      font-weight: 600;
      transition: color .35s;
    }
    .link.branch .link-title { font-size: 22px; }
    .link-ar {
      font-size: 14px;
      opacity: .7;
      transition: color .35s;
    }
    .link:hover .link-ar { color: rgba(240, 228, 203, .75); }
    .link-meta {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      opacity: .6;
      transition: color .35s;
    }
    .link:hover .link-meta { color: rgba(240, 228, 203, .6); }

    .link-side {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .badge-new {
      border: 1.5px dotted #A8842B;
      color: #A8842B;
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
    }
    .link-icon {
      width: 44px;
      height: 44px;
      border: 1.5px solid #4A2E15;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      color: #4A2E15;
      transition: background .35s, color .35s, border-color .35s;
    }
    .link:hover .link-icon {
      background: #F0E4CB;
      color: #4A2E15;
      border-color: #F0E4CB;
    }

    .visit-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 14px 0 2px;
      animation: rw-fade-up .9s .65s both;
    }
    .visit-divider .rule {
      flex: 1;
      border-top: 2px dotted rgba(74, 46, 21, .45);
    }
    .visit-divider .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .34em;
      text-indent: .34em;
      text-transform: uppercase;
      opacity: .65;
    }
    .visit-divider .ar {
      font-size: 13px;
      color: #A8842B;
    }

    .delay-1 { animation: rw-fade-up .9s .35s both; }
    .delay-2 { animation: rw-fade-up .9s .45s both; }
    .delay-3 { animation: rw-fade-up .9s .55s both; }
    .delay-4 { animation: rw-fade-up .9s .75s both; }
    .delay-5 { animation: rw-fade-up .9s .85s both; }

    .socials {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: 48px;
      animation: rw-fade-in 1.2s 1s both;
    }
    .socials .rule {
      width: 34px;
      border-top: 2px dotted rgba(74, 46, 21, .45);
    }
    .social {
      width: 48px;
      height: 48px;
      border: 1.5px solid rgba(74, 46, 21, .6);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #4A2E15;
      transition: background .35s, color .35s, border-color .35s;
    }
    .social:hover {
      background: #4A2E15;
      color: #F0E4CB;
      border-color: #4A2E15;
    }

    .hours {
      margin-top: 34px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .34em;
      text-indent: .34em;
      text-transform: uppercase;
      opacity: .5;
      text-align: center;
      animation: rw-fade-in 1.2s 1.1s both;
    }
  </style>
</head>
<body>

  <div class="page" data-screen-label="Linktree">
    <img class="watermark" src="../assets/logo-mark.png" alt="" aria-hidden="true">

    <div class="logo-ring">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <path id="rw-lk-circ" d="M 50,50 m -46,0 a 46,46 0 1,1 92,0 a 46,46 0 1,1 -92,0"></path>
        </defs>
        <text>
          <textPath href="#rw-lk-circ">RAWAA &nbsp;&bull;&nbsp; SPECIALITY COFFEE &nbsp;&bull;&nbsp; MANAMA &nbsp;&bull;&nbsp;</textPath>
        </text>
      </svg>
      <div class="logo-core">
        <img src="../assets/logo-mark.png" alt="Rawaa">
      </div>
    </div>

    <div class="brand-block">
      <div class="brand-name">Rawaa</div>
      <div class="brand-ar">رواء للقهوة المختصة</div>
      <div class="brand-sub">Speciality Coffee &mdash; Bahrain</div>
      <div class="brand-line"></div>
    </div>

    <div class="links">
      <a class="link delay-1" href="../">
        <span class="link-num">01</span>
        <span class="link-body">
          <span class="link-title-row">
            <span class="link-title">The Menu</span>
            <span class="link-ar">منيو</span>
          </span>
        </span>
        <span class="link-side">
          <span class="link-icon">&#8599;</span>
        </span>
      </a>

      <a class="link delay-2" href="https://www.instagram.com/rawaacoffee.bh/" target="_blank" rel="noopener noreferrer">
        <span class="link-num">02</span>
        <span class="link-body">
          <span class="link-title-row">
            <span class="link-title">Instagram</span>
            <span class="link-ar">انستغرام</span>
          </span>
        </span>
        <span class="link-icon">&#8599;</span>
      </a>

      <a class="link delay-3" href="https://tiktok.com/" target="_blank" rel="noopener noreferrer">
        <span class="link-num">03</span>
        <span class="link-body">
          <span class="link-title-row">
            <span class="link-title">TikTok</span>
            <span class="link-ar">تيك توك</span>
          </span>
        </span>
        <span class="link-icon">&#8599;</span>
      </a>

      <div class="visit-divider">
        <div class="rule"></div>
        <div class="label">Visit Us</div>
        <div class="ar">فروعنا</div>
        <div class="rule"></div>
      </div>

      <a class="link branch delay-5" href="https://maps.google.com/?q=5FFM%2B66H+Janabiyah" target="_blank" rel="noopener noreferrer">
        <span class="link-num">04</span>
        <span class="link-body">
          <span class="link-title-row">
            <span class="link-title">District Branch</span>
            <span class="link-ar">فرع ديستريكت</span>
          </span>
          <span class="link-meta">5FFM+66H, Janabiyah</span>
        </span>
        <span class="link-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
        </span>
      </a>
    </div>

    <div class="socials">
      <a class="social" href="https://www.instagram.com/rawaacoffee.bh/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2.5" y="2.5" width="19" height="19" rx="5.5"></rect>
          <circle cx="12" cy="12" r="4.2"></circle>
          <circle cx="17.6" cy="6.4" r="1" fill="currentColor" stroke="none"></circle>
        </svg>
      </a>
      <span class="rule"></span>
      <a class="social" href="https://tiktok.com/" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M16.6 3c.4 2.1 1.8 3.7 3.9 4v3c-1.5 0-2.9-.5-3.9-1.3v6.1c0 3.4-2.7 6.2-6.1 6.2S4.4 18.2 4.4 14.8c0-3.3 2.5-6 5.8-6.2v3.1c-1.5.2-2.7 1.5-2.7 3.1 0 1.7 1.4 3.1 3.1 3.1s3.1-1.4 3.1-3.1V3h2.9Z"></path>
        </svg>
      </a>
      <span class="rule"></span>
      <a class="social" href="https://wa.me/" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3a9 9 0 0 0-7.8 13.5L3 21l4.6-1.2A9 9 0 1 0 12 3Z"></path>
          <path d="M8.8 8.9c.2-.5.4-.5.7-.5h.6c.2 0 .4 0 .5.4l.7 1.7c.1.2 0 .4-.1.5l-.5.6c-.1.2-.1.3 0 .5.5.9 1.3 1.7 2.3 2.2.2.1.4.1.5-.1l.5-.6c.2-.2.3-.2.5-.1l1.7.8c.3.1.4.3.4.5-.1.7-.6 1.4-1.3 1.6-.6.2-1.3.2-2.2-.2-1.7-.7-3.2-2-4.2-3.7-.5-.9-.7-1.7-.5-2.4.1-.5.3-.9.4-1.2Z" fill="currentColor" stroke="none"></path>
        </svg>
      </a>
    </div>

    <div class="hours">Daily 7 AM &mdash; 11 PM &nbsp;&bull;&nbsp; Bahrain</div>
  </div>

</body>
</html>
